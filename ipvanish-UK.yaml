name: ipvanish-UK

x-shared: &shared-gluetun
  image: qmcgaw/gluetun:v3.41.0
  # image: qmcgaw/gluetun
  cap_add:
    - NET_ADMIN
  devices:
    - /dev/net/tun:/dev/net/tun
  labels:
      autoheal-app: true
  # volumes:
      # - ./servers.json:/gluetun/servers.json:ro
  
  # command: update -enduser -providers ipvanish

x-common-environment: &common-environment
  VPN_SERVICE_PROVIDER: ipvanish
  OPENVPN_USER: ${OPENVPN_USER}
  OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
  HTTPPROXY: "on"
  HTTPPROXY_STEALTH: "on"
  BLOCK_MALICIOUS: "off"
  BLOCK_SURVEILLANCE: "off"
  BLOCK_ADS: "off"

services:
  UK-bfs-c01:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bfs-c01.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8001"
    ports:
      - 8001:8001

  UK-bfs-c02:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bfs-c02.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8002"
    ports:
      - 8002:8002

  UK-bhx-c01:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bhx-c01.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8003"
    ports:
      - 8003:8003

  UK-bhx-c04:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bhx-c04.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8004"
    ports:
      - 8004:8004

  UK-bhx-c05:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bhx-c05.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8005"
    ports:
      - 8005:8005

  UK-bhx-c06:
    <<: *shared-gluetun
    environment:
      <<: *common-environment
      SERVER_HOSTNAMES: bhx-c06.ipvanish.com
      HTTPPROXY_LISTENING_ADDRESS: ":8006"
    ports:
      - 8006:8006
